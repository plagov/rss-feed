<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <title>Register</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/css/output.css"/>
</head>
<body class="h-full bg-gradient-to-br from-sky-100 via-white to-emerald-100">
<div class="flex min-h-full flex-col justify-center px-6 py-12">
    <div class="mx-auto w-full max-w-md rounded-2xl bg-white p-8 shadow-xl">
        <h1 class="text-3xl font-bold text-gray-900">Create admin account</h1>
        <p class="mt-2 text-sm text-gray-600">This bootstrap page is available only until the first user exists.</p>

        <p th:if="${error}" th:text="${error}" class="mt-4 rounded-md bg-red-50 px-4 py-3 text-sm text-red-700">Error</p>

        <form method="post" th:action="@{/register}" class="mt-6 space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input id="username" name="username" type="text" required
                       class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2"/>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input id="password" name="password" type="password" required
                       class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2"/>
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input id="email" name="email" type="email"
                       class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2"/>
            </div>
            <button type="submit"
                    class="w-full rounded-lg bg-gray-900 px-4 py-2 text-white hover:bg-gray-700">
                Register
            </button>
        </form>

        <p class="mt-6 text-sm text-gray-600">
            Already registered?
            <a href="/login" class="font-medium text-sky-700 hover:text-sky-900">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
