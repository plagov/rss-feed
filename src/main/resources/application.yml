spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:5432/postgres
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:rss-feed}
    audience: ${JWT_AUDIENCE:rss-feed-client}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
